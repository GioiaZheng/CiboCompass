name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run check

  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install SQLite build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc sqlite3 libsqlite3-dev

      - name: Run tests
        working-directory: backend
        run: go test ./...
